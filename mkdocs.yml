site_name: AI Governance
site_description: Comprehensive AI governance tools, applications, and resources
site_author: Shervin Khazaeli
repo_url: https://github.com/shervin-ai/ai-governance
repo_name: shervin-ai/ai-governance

theme:
  name: material
  palette:
    - scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - navigation.top
    - search.suggest
    - search.highlight
    - content.code.copy

nav:
  - Home: README.md
  - Getting Started:
    - Overview: docs/README.md
  - Tools:
    - Overview: tools/README.md
  - Apps:
    - Overview: apps/README.md
  - Agents:
    - Overview: agents/README.md
    - Claude Skills: agents/claude-skills/README.md
  - Resources:
    - Overview: resources/README.md
    - Glossary: resources/knowledge-base/glossary.md
  - Examples:
    - Overview: examples/README.md
  - External:
    - Overview: external/README.md
  - Contributing: CONTRIBUTING.md

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.tabbed:
      alternate_style: true
  - tables
  - toc:
      permalink: true

plugins:
  - search
  - awesome-pages

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/shervin-ai/ai-governance
